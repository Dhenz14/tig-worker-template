# capabilities.yaml -- tig-worker-template surface registry
#
# Registers the public CLI surface of the tig-worker drop-in starter for
# Hive-AI TIG-style RAG-improvement mining. Consumed by the Hive-AI
# unified capabilities registry. Schema: bare list of capability entries
# keyed by name (kebab-case), organ (one of 10 canonical organs), and
# surface_type (cli_command for entrypoints exposed as ).
#
# Organ mapping (per docs/FEATURE_ORGAN_REGISTRY.md):
#   - senses.ingest_signal: fetch/rehearse/submit/auto-mine -- the ingest
#     path that pulls challenge specs, scores candidates, and submits to
#     the frontier. TIG miners are signal producers for the RAG brain.
#   - immune.eval_safety: list/keygen/leaderboard -- discovery + identity
#     + frontier inspection primitives.  and  are
#     eval/visibility surfaces;  is the identity primitive
#     gating submission authenticity.
#
# Source: README.md (quick-start commands) + Makefile (target enumeration).

- name: tig-list-challenges
  organ: immune.eval_safety
  surface_type: cli_command
  surface_path: hiveai tig list
  description: List available TIG RAG-improvement challenges (chunking, embedding, index, etc.) that a miner can fetch and attempt.
  status: LIVE
  source_file: README.md

- name: tig-fetch-challenge
  organ: senses.ingest_signal
  surface_type: cli_command
  surface_path: hiveai tig fetch <challenge> --dest <dir>
  description: Drop the spec, manifest, and skeleton solution file for a challenge into a working directory so the miner can edit my_solution.py.
  status: LIVE
  source_file: README.md

- name: tig-rehearse-solution
  organ: senses.ingest_signal
  surface_type: cli_command
  surface_path: hiveai tig rehearse <file> --challenge <name>
  description: Score a candidate Python solution locally in the sandbox (AST denylist, mem/CPU/wallclock caps) and return structured feedback before submission.
  status: LIVE
  source_file: README.md

- name: tig-submit-solution
  organ: senses.ingest_signal
  surface_type: cli_command
  surface_path: hiveai tig submit <file> --challenge <name> --host <url> --key <keypair.json>
  description: Sign the candidate with the miner ed25519 keypair and submit it to the Hive-AI host for frontier evaluation and promotion consideration.
  status: LIVE
  source_file: README.md

- name: tig-auto-mine
  organ: senses.ingest_signal
  surface_type: cli_command
  surface_path: hiveai tig auto-mine --challenge <name> --model <id> --rounds <n>
  description: Run an LLM-driven mining loop that reads the manifest, prompts the model for candidates, scores each locally, and iterates within a USD budget. Optional --submit pushes the best candidate.
  status: LIVE
  source_file: README.md

- name: tig-keygen
  organ: immune.eval_safety
  surface_type: cli_command
  surface_path: hiveai tig keygen --save <keypair.json>
  description: Generate an ed25519 keypair that establishes the miner identity for reward attribution on the leaderboard.
  status: LIVE
  source_file: README.md

- name: tig-leaderboard
  organ: immune.eval_safety
  surface_type: cli_command
  surface_path: hiveai tig leaderboard <challenge>
  description: Display the live frontier for a challenge -- submission rank, times reused in the RAG hot path (last 7 days), and retrieval lift vs prior champion.
  status: LIVE
  source_file: Makefile
