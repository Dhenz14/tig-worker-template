# capabilities.yaml -- tig-worker-template surface registry
#
# Canonical capability contract for the public TIG worker starter. This file is
# consumed by Hive-AI's unified capability registry.

repo: tig-worker-template
schema_version: hiveai.unified_capability.v1
contracts:
  - feature: tig-list-challenges
    organ_id: immune.eval_safety
    source_organ: immune.eval_safety
    synergy_targets:
      - senses.ingest_signal
    gap_status: LIVE
    repo: tig-worker-template
    surface_type: cli_command
    surface_path: hiveai tig list
    description: List available TIG RAG-improvement challenges that a miner can fetch and attempt.
    evidence_refs:
      - README.md
      - Makefile
    entry_path: README.md#quick-start-5-commands

  - feature: tig-fetch-challenge
    organ_id: senses.ingest_signal
    source_organ: senses.ingest_signal
    synergy_targets:
      - memory.retrieval_core
      - immune.eval_safety
    gap_status: LIVE
    repo: tig-worker-template
    surface_type: cli_command
    surface_path: hiveai tig fetch <challenge> --dest <dir>
    description: Drop the spec, manifest, and skeleton solution file for a challenge into a working directory.
    evidence_refs:
      - README.md
      - Makefile
    entry_path: README.md#quick-start-5-commands

  - feature: tig-rehearse-solution
    organ_id: senses.ingest_signal
    source_organ: senses.ingest_signal
    synergy_targets:
      - immune.eval_safety
      - memory.retrieval_core
    gap_status: LIVE
    repo: tig-worker-template
    surface_type: cli_command
    surface_path: hiveai tig rehearse <file> --challenge <name>
    description: Score a candidate Python solution locally in the sandbox and return structured feedback before submission.
    evidence_refs:
      - README.md
      - example_solution.py
    entry_path: README.md#quick-start-5-commands

  - feature: tig-submit-solution
    organ_id: senses.ingest_signal
    source_organ: senses.ingest_signal
    synergy_targets:
      - immune.eval_safety
      - memory.retrieval_core
    gap_status: LIVE
    repo: tig-worker-template
    surface_type: cli_command
    surface_path: hiveai tig submit <file> --challenge <name> --host <url> --key <keypair.json>
    description: Sign the candidate with the miner ed25519 keypair and submit it for frontier evaluation.
    evidence_refs:
      - README.md
      - Makefile
    entry_path: README.md#quick-start-5-commands

  - feature: tig-auto-mine
    organ_id: senses.ingest_signal
    source_organ: senses.ingest_signal
    synergy_targets:
      - memory.retrieval_core
      - immune.eval_safety
    gap_status: LIVE
    repo: tig-worker-template
    surface_type: cli_command
    surface_path: hiveai tig auto-mine --challenge <name> --model <provider:model> --rounds <n>
    description: Run a BYOM LLM-driven mining loop that reads the manifest, scores candidates locally, and optionally submits the best candidate.
    evidence_refs:
      - README.md
      - Makefile
    entry_path: README.md#or-let-an-llm-mine-for-you

  - feature: tig-keygen
    organ_id: immune.eval_safety
    source_organ: immune.eval_safety
    synergy_targets:
      - senses.ingest_signal
    gap_status: LIVE
    repo: tig-worker-template
    surface_type: cli_command
    surface_path: hiveai tig keygen --save <keypair.json>
    description: Generate an ed25519 keypair that establishes miner identity for signed submissions and reward attribution.
    evidence_refs:
      - README.md
      - Makefile
    entry_path: README.md#files-in-this-template

  - feature: tig-leaderboard
    organ_id: immune.eval_safety
    source_organ: immune.eval_safety
    synergy_targets:
      - senses.ingest_signal
      - memory.retrieval_core
    gap_status: LIVE
    repo: tig-worker-template
    surface_type: cli_command
    surface_path: hiveai tig leaderboard <challenge>
    description: Display the live frontier for a challenge, including rank, reuse, and retrieval lift.
    evidence_refs:
      - README.md
      - Makefile
    entry_path: README.md#reward-signal
